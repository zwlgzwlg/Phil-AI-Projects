<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socrates</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-wrapper">
        <div id="top-bar">
            <span id="game-title">SOCRATES</span>
            <div id="hud">
                <span>HP: <strong id="hud-hp">100/100</strong></span>
                <span>Zone: <strong id="hud-zone">Agora</strong></span>
                <span>Turn: <strong id="hud-turn">1</strong></span>
                <span>Move: <strong id="hud-move">4/4</strong></span>
                <span>Action: <strong id="hud-action">1/1</strong></span>
            </div>
        </div>

        <div id="main-area">
            <div id="canvas-col">
                <canvas id="game-canvas"></canvas>
                <div id="action-bar">
                    <button id="btn-attack" disabled>Attack</button>
                    <button id="btn-talk" disabled>Talk</button>
                    <button id="btn-item" disabled>Use Item</button>
                    <button id="btn-interact" disabled>Interact</button>
                    <button id="btn-end-turn">End Turn</button>
                </div>
            </div>

            <div id="log-col">
                <div id="log-header">Game Log</div>
                <div id="log-panel"></div>
            </div>
        </div>
    </div>

    <!-- Dialogue overlay -->
    <div id="dialogue-overlay" class="hidden">
        <div id="dialogue-panel">
            <div id="dialogue-header">
                <span id="dialogue-npc-name">NPC</span>
                <button id="dialogue-close-btn">End Conversation</button>
            </div>
            <div id="chat-log"></div>
            <div id="chat-input-row">
                <input type="text" id="chat-input" placeholder="Speak..." autocomplete="off">
                <button id="chat-send-btn">Send</button>
            </div>
        </div>
    </div>

    <!-- Inventory overlay -->
    <div id="inventory-overlay" class="hidden">
        <div id="inventory-panel">
            <div id="inventory-header">
                <span>Inventory</span>
                <button id="inventory-close-btn">Close</button>
            </div>
            <div id="inventory-grid"></div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
