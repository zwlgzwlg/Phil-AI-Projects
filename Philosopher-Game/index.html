<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philosopher</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-wrapper">
        <div id="top-bar">
            <span id="game-title">PHILOSOPHER</span>
            <div id="hud">
                <span>HP: <strong id="hud-hp">100/100</strong></span>
                <span>Zone: <strong id="hud-zone">Agora</strong></span>
                <span>Turn: <strong id="hud-turn">1</strong></span>
                <span>Move: <strong id="hud-move">4/4</strong></span>
                <span>Action: <strong id="hud-action">1/1</strong></span>
            </div>
        </div>

        <div id="main-area">
            <div id="canvas-col">
                <canvas id="game-canvas"></canvas>
                <div id="speech-bar">
                    <input type="text" id="speech-input" placeholder="Say something..." autocomplete="off" disabled>
                    <button id="btn-speak" disabled>Speak</button>
                    <button id="btn-end-turn">End Turn</button>
                </div>
            </div>

            <div id="side-col">
                <div id="inventory-col">
                    <div id="inventory-header">Inventory</div>
                    <div id="inventory-list"></div>
                </div>
                <div id="log-col">
                    <div id="log-header">Game Log</div>
                    <div id="log-panel"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Context menu -->
    <div id="context-menu" class="hidden"></div>

    <!-- Inspect panel -->
    <div id="inspect-overlay" class="hidden">
        <div id="inspect-panel">
            <div id="inspect-header">
                <span id="inspect-title">Inspect</span>
                <button id="inspect-close-btn">Close</button>
            </div>
            <div id="inspect-body"></div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
